<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>教員用ホワイトボード ログイン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="/style.css?v=toolbar-chat-templates" rel="stylesheet" />
</head>

<body class="app-root">
  <main class="login-container teacher-login-card">
    <p class="login-product-name">Class Whiteboard</p>
    <h1>先生ログイン画面</h1>
    <form method="POST" action="/teacher/login">
      <label>
        パスワード
        <input type="password" name="password" placeholder="••••••••" required />
      </label>
      <label>
        クラスコード
        <input type="text" name="classCode" placeholder="例: ABC123" />
      </label>
      <button type="submit">ログイン</button>
    </form>
  </main>
</body>

</html>
